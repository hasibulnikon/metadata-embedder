name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller

      - name: Download ExifTool for Windows
        run: |
          Invoke-WebRequest -Uri "https://oliverbetz.de/cms/files/Artikel/ExifTool-for-Windows/ExifTool_install_13.59_64.exe" -OutFile ExifTool_install.exe -UseBasicParsing
          Start-Process -FilePath "ExifTool_install.exe" -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART /DIR=C:\ExifTool" -Wait
          if (Test-Path "C:\ExifTool\exiftool.exe") {
            Copy-Item "C:\ExifTool\exiftool.exe" -Destination "exiftool.exe"
            Write-Host "ExifTool installed successfully"
          } elseif (Test-Path "C:\Windows\exiftool.exe") {
            Copy-Item "C:\Windows\exiftool.exe" -Destination "exiftool.exe"
            Write-Host "ExifTool found in Windows"
          } else {
            $found = Get-ChildItem -Path "C:\" -Filter "exiftool.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) {
              Copy-Item $found.FullName -Destination "exiftool.exe"
              Write-Host "ExifTool found at: $($found.FullName)"
            } else {
              Write-Error "ExifTool not found after install"
              exit 1
            }
          }
          Write-Host "Size: $((Get-Item exiftool.exe).Length) bytes"
        shell: pwsh

      - name: Build EXE with PyInstaller
        run: pyinstaller --onefile --windowed --name "MetadataEmbedder" --add-data "exiftool.exe;." metadata_tool.py

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: MetadataEmbedder-Windows
          path: dist\MetadataEmbedder.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.5
          name: Stock Metadata Embedder v1.5
          body: |
            ## Stock Metadata Embedder v1.5
            Dark theme + Reset button. Batch embed IPTC + XMP from CSV into JPEG, PNG, EPS, AI.
            1. Download MetadataEmbedder.exe
            2. Double-click to open — no install needed
            3. Load CSV → map columns → select folder → Embed
            ExifTool is bundled inside.
          files: dist\MetadataEmbedder.exe
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
