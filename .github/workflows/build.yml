name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller

      - name: Download ExifTool for Windows
        run: |
          Invoke-WebRequest -Uri "https://oliverbetz.de/cms/files/Artikel/ExifTool-for-Windows/ExifTool_install_13.59_64.exe" -OutFile ExifTool_install.exe -UseBasicParsing
          Start-Process -FilePath "ExifTool_install.exe" -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART /DIR=C:\ExifTool" -Wait
          if (Test-Path "C:\ExifTool\exiftool.exe") {
            Copy-Item "C:\ExifTool\exiftool.exe" -Destination "exiftool.exe"
          } elseif (Test-Path "C:\Windows\exiftool.exe") {
            Copy-Item "C:\Windows\exiftool.exe" -Destination "exiftool.exe"
          } else {
            $found = Get-ChildItem -Path "C:\" -Filter "exiftool.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) { Copy-Item $found.FullName -Destination "exiftool.exe" }
            else { Write-Error "ExifTool not found"; exit 1 }
          }
          $size = (Get-Item exiftool.exe).Length
          Write-Host "ExifTool ready: $size bytes"
        shell: pwsh

      - name: Build EXE with PyInstaller (with icon if present)
        run: |
          $iconFlag = ""
          if (Test-Path "icon.ico") {
            $iconFlag = "--icon=icon.ico"
            Write-Host "Custom icon found, using icon.ico"
          } else {
            Write-Host "No icon.ico found, using default"
          }
          $addData = "--add-data=C:\ExifTool\exiftool.exe;exiftool_pkg"
          if (Test-Path "C:\ExifTool\exiftool_files") {
            $addData2 = "--add-data=C:\ExifTool\exiftool_files;exiftool_pkg\exiftool_files"
            if ($iconFlag) {
              pyinstaller --onefile --windowed --name "MetadataEmbedder" $iconFlag $addData $addData2 metadata_tool.py
            } else {
              pyinstaller --onefile --windowed --name "MetadataEmbedder" $addData $addData2 metadata_tool.py
            }
          } else {
            if ($iconFlag) {
              pyinstaller --onefile --windowed --name "MetadataEmbedder" $iconFlag $addData metadata_tool.py
            } else {
              pyinstaller --onefile --windowed --name "MetadataEmbedder" $addData metadata_tool.py
            }
          }
        shell: pwsh

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: MetadataEmbedder-Windows
          path: dist\MetadataEmbedder.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.9
          name: Stock Metadata Embedder v1.9
          body: |
            ## Stock Metadata Embedder v1.9
            - Dark theme UI with compact layout
            - Reset button next to Embed button
            - Activity log panel (collapsible)
            - Status bar with live pill counters
            - Extension-agnostic file matching (CSV says .png, finds .jpg automatically)
            - Custom icon support (place icon.ico in repo root)
            - Timestamps in activity log

            **How to use:** Download MetadataEmbedder.exe · Double-click · Load CSV · Map columns · Select folder · Embed
          files: dist\MetadataEmbedder.exe
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
