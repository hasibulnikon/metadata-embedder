name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller

      - name: Download ExifTool for Windows
        run: |
          $url = "https://github.com/exiftool/exiftool/archive/refs/tags/13.55.zip"
          Invoke-WebRequest -Uri $url -OutFile et.zip -UseBasicParsing
          Expand-Archive et.zip -DestinationPath et_src -Force
          dir et_src
        shell: pwsh

      - name: Install Strawberry Perl and build ExifTool exe
        run: |
          choco install strawberryperl -y --no-progress
          refreshenv
          cpan PAR::Packer
          cd et_src\exiftool-13.55
          pp -o ..\..\exiftool.exe exiftool
        shell: pwsh

      - name: Build EXE with PyInstaller
        run: pyinstaller --onefile --windowed --name "MetadataEmbedder" --add-data "exiftool.exe;." metadata_tool.py

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: MetadataEmbedder-Windows
          path: dist\MetadataEmbedder.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.3
          name: Stock Metadata Embedder v1.3
          body: |
            ## Stock Metadata Embedder
            Batch embed IPTC + XMP metadata from CSV into JPEG, PNG, EPS, AI files.
            1. Download MetadataEmbedder.exe
            2. Double-click to open
            3. Load CSV, map columns, select folder, click Embed
          files: dist\MetadataEmbedder.exe
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
