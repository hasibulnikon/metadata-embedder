name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller

      - name: Download ExifTool for Windows
        run: |
          Invoke-WebRequest -Uri "https://oliverbetz.de/cms/files/Artikel/ExifTool-for-Windows/ExifTool_install_13.59_64.exe" -OutFile ExifTool_install.exe -UseBasicParsing
          Start-Process -FilePath "ExifTool_install.exe" -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART /DIR=C:\ExifTool" -Wait
          Write-Host "Contents of C:\ExifTool:"
          Get-ChildItem "C:\ExifTool" -Recurse | Select-Object FullName
        shell: pwsh

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name "MetadataEmbedder" --add-data "C:\ExifTool\exiftool.exe;exiftool_pkg" --add-data "C:\ExifTool\exiftool_files;exiftool_pkg\exiftool_files" metadata_tool.py
        shell: pwsh

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: MetadataEmbedder-Windows
          path: dist\MetadataEmbedder.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.6
          name: Stock Metadata Embedder v1.6
          body: |
            ## Stock Metadata Embedder v1.6
            Dark theme + Reset button. Batch embed IPTC + XMP from CSV into JPEG, PNG, EPS, AI.
            1. Download MetadataEmbedder.exe
            2. Double-click to open — no install needed
            3. Load CSV → map columns → select folder → Embed
            ExifTool is bundled inside.
          files: dist\MetadataEmbedder.exe
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
